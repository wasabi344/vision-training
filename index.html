<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>顔向きトラッキング・ビジョントレーニング</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 画面中央のターゲットドット */
        #target-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background-color: #ff3b30;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.6);
            z-index: 10;
        }

        /* 視線（顔の向き）の可視化ドット */
        #gaze-pointer {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: rgba(76, 217, 100, 0.8);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
            pointer-events: none;
            transition: transform 0.05s ease-out;
        }

        /* ヘッダー情報 */
        #header-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 20;
            width: 300px;
        }

        .info-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        #status {
            font-size: 13px;
            color: #007aff;
            font-weight: bold;
            margin-top: 5px;
        }

        /* カメラ映像（右上固定） */
        #camera-view {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 20;
            border: 2px solid #ccc;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>

<div id="header-info">
    <p class="info-text">注視時間: <span id="timer">0.0</span> 秒</p>
    <div id="status">カメラ起動中...</div>
</div>

<div id="target-dot"></div>
<div id="gaze-pointer"></div>
<video id="camera-view" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@3.12.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@3.12.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@3.12.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-detection@1.0.2/dist/face-detection.min.js"></script>

<script>
    let detector;
    let video;
    let pointer;
    let statusDiv;
    
    let lookStartTime = null;
    let totalElapsedTime = 0;
    let isLooking = false;

    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;

    window.onload = async () => {
        video = document.getElementById('camera-view');
        pointer = document.getElementById('gaze-pointer');
        statusDiv = document.getElementById('status');

        try {
            // 1. カメラ起動
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            
            statusDiv.innerText = "iPad専用AIモデルをロード中...";

            // 2. iPadOS（Safari）のJavaScript環境で「絶対にエラーにならない」最新の顔認識設定
            const model = faceDetection.SupportedModels.MediaPipeFaceDetector;
            detector = await faceDetection.createDetector(model, {
                runtime: 'mediapipe',
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection'
            });

            pointer.style.display = 'block';
            statusDiv.innerText = "追跡スタート！画面を正面から見て顔を動かしてください";
            statusDiv.style.color = "#4cd964";

            // 3. 追跡ループ開始
            trackFace();

        } catch (error) {
            statusDiv.innerText = "起動エラー: " + error.message;
            statusDiv.style.color = "#ff3b30";
        }

        setInterval(updateTimer, 100);
    };

    async function trackFace() {
        if (video.readyState >= 2) {
            try {
                const faces = await detector.estimateFaces(video, { flipHorizontal: false });

                if (faces.length > 0) {
                    // 顔の中心（鼻付近）の座標と目の位置を取得
                    const box = faces[0].box;
                    const faceCenterX = box.xMin + (box.width / 2);
                    const faceCenterY = box.yMin + (box.height / 2);

                    // カメラ(640x480)の真ん中からのズレを計算
                    const diffX = faceCenterX - 320;
                    const diffY = faceCenterY - 240;

                    // ノートPCスタイル（斜め画面）に合わせた感度チューニング
                    let targetX = (screenWidth / 2) - (diffX * 6);
                    let targetY = (screenHeight / 2) + (diffY * 8) + 120; // 斜めのカメラ角度を相殺する補正値

                    targetX = Math.max(0, Math.min(screenWidth, targetX));
                    targetY = Math.max(0, Math.min(screenHeight, targetY));

                    // 緑の点を動かす
                    pointer.style.left = targetX + 'px';
                    pointer.style.top = targetY + 'px';

                    checkGazeOnTarget(targetX, targetY);
                }
            } catch (e) {
                // ループ内の一時的な読み込みエラーは無視して継続
            }
        }
        requestAnimationFrame(trackFace);
    }

    function checkGazeOnTarget(gx, gy) {
        const target = document.getElementById('target-dot');
        const rect = target.getBoundingClientRect();
        const targetX = rect.left + (rect.width / 2);
        const targetY = rect.top + (rect.height / 2);

        const tolerance = 150; 
        const distance = Math.sqrt(Math.pow(gx - targetX, 2) + Math.pow(gy - targetY, 2));

        if (distance <= tolerance) {
            if (!isLooking) {
                lookStartTime = Date.now();
                isLooking = true;
            }
        } else {
            if (isLooking) {
                totalElapsedTime += (Date.now() - lookStartTime);
                lookStartTime = null;
                isLooking = false;
            }
        }
    }

    function updateTimer() {
        if (isLooking && lookStartTime) {
            const currentSessionTime = Date.now() - lookStartTime;
            const totalSeconds = ((totalElapsedTime + currentSessionTime) / 1000).toFixed(1);
            document.getElementById('timer').innerText = totalSeconds;
        } else {
            const totalSeconds = (totalElapsedTime / 1000).toFixed(1);
            document.getElementById('timer').innerText = totalSeconds;
        }
    }
</script>
</body>
</html>
