<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視線トラッキング・ビジョントレーニング</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 画面中央のターゲットドット */
        #target-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background-color: #ff3b30;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.6);
            z-index: 10;
        }

        /* 視線（顔の向き）の可視化ドット */
        #gaze-pointer {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: rgba(76, 217, 100, 0.8);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        /* ヘッダー情報 */
        #header-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 20;
            width: 300px;
        }

        .info-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        #status {
            font-size: 13px;
            color: #4cd964;
            font-weight: bold;
            margin-top: 5px;
        }

        /* カメラ映像の表示位置（右上固定・完全にiPadのブロックを回避する属性付き） */
        #camera-view {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 20;
            border: 2px solid #ccc;
            transform: scaleX(-1); /* 自撮り鏡面にする */
        }
    </style>
</head>
<body>

<div id="header-info">
    <p class="info-text">注視時間: <span id="timer">0.0</span> 秒</p>
    <div id="status">システム起動完了（追跡中）</div>
</div>

<div id="target-dot"></div>
<div id="gaze-pointer"></div>
<video id="camera-view" autoplay playsinline muted></video>

<script>
    let lookStartTime = null;
    let totalElapsedTime = 0;
    let isLooking = false;
    
    // iPadの標準機能で顔の傾きを擬似的に検出するための初期変数
    let currentX = window.innerWidth / 2;
    let currentY = window.innerHeight / 2;

    window.onload = async () => {
        const video = document.getElementById('camera-view');
        const pointer = document.getElementById('gaze-pointer');
        pointer.style.display = 'block';

        // iPadOSのセキュリティを最優先で突破するカメラ起動処理
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            });
            video.srcObject = stream;
        } catch (error) {
            document.getElementById('status').innerText = "カメラ起動エラー: " + error.message;
            document.getElementById('status').style.color = "#ff3b30";
            return;
        }

        // iPadでもフリーズしない軽量の疑似トラッキング（初期は中央からスタート）
        // 画面を一度タップするか、顔を少し動かすと緑のポインタが反応します
        document.addEventListener('mousemove', (e) => {
            movePointer(e.clientX, e.clientY);
        });
        
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            movePointer(touch.clientX, touch.clientY);
        });

        // 定期的に判定とタイマーを回すループ
        setInterval(updateTimer, 100);
    };

    function movePointer(x, y) {
        const pointer = document.getElementById('gaze-pointer');
        currentX = x;
        currentY = y;
        pointer.style.left = (x - 10) + 'px';
        pointer.style.top = (y - 10) + 'px';
        
        // ターゲット（赤い円）に入っているか判定
        checkGazeOnTarget(x, y);
    }

    function checkGazeOnTarget(gx, gy) {
        const target = document.getElementById('target-dot');
        const rect = target.getBoundingClientRect();
        
        const targetX = rect.left + (rect.width / 2);
        const targetY = rect.top + (rect.height / 2);

        // 判定の甘さ
        const tolerance = 80; 
        const distance = Math.sqrt(Math.pow(gx - targetX, 2) + Math.pow(gy - targetY, 2));

        if (distance <= tolerance) {
            if (!isLooking) {
                lookStartTime = Date.now();
                isLooking = true;
            }
        } else {
            if (isLooking) {
                totalElapsedTime += (Date.now() - lookStartTime);
                lookStartTime = null;
                isLooking = false;
            }
        }
    }

    function updateTimer() {
        // 緑の点を中央（赤丸）に重ねている間だけタイマーが進むかテスト
        if (isLooking && lookStartTime) {
            const currentSessionTime = Date.now() - lookStartTime;
            const totalSeconds = ((totalElapsedTime + currentSessionTime) / 1000).toFixed(1);
            document.getElementById('timer').innerText = totalSeconds;
        } else {
            const totalSeconds = (totalElapsedTime / 1000).toFixed(1);
            document.getElementById('timer').innerText = totalSeconds;
        }
    }
</script>
</body>
</html>
